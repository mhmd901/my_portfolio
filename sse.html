<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .review-card {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .stars input {
      display: none;
    }
    .stars label {
      font-size: 30px;
      color: #ccc;
      cursor: pointer;
    }
    .stars input:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label {
      color: #FFD700;
    }
    .logo {
      max-height: 60px;
      display: block;
      margin: 0 auto 15px;
    }
  </style>
</head>
<body>

<div class="card review-card text-center">
  <!-- SSE Logo -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Logo_SSE.svg/2560px-Logo_SSE.svg.png" alt="SSE Logo" class="logo">

  <!-- Star Rating -->
  <div class="stars d-flex justify-content-center">
    <input type="radio" id="star5" name="rating" value="5"><label for="star5">&#9733;</label>
    <input type="radio" id="star4" name="rating" value="4"><label for="star4">&#9733;</label>
    <input type="radio" id="star3" name="rating" value="3"><label for="star3">&#9733;</label>
    <input type="radio" id="star2" name="rating" value="2"><label for="star2">&#9733;</label>
    <input type="radio" id="star1" name="rating" value="1"><label for="star1">&#9733;</label>
  </div>

  <!-- Comment Box -->
  <div class="form-group mt-3">
    <textarea class="form-control" rows="2" placeholder="Write your comment here..."></textarea>
  </div>
</div>

</body>
</html>
